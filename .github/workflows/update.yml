name: Update FX Data

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 00:00 UTC（日本時間 09:00）
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # ← CSV を push するために必須

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ① リポジトリを取得
        uses: actions/checkout@v4

      - name: ② Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ③ ライブラリインストール
        run: pip install yfinance pandas

      - name: ④ データ更新スクリプト実行
        run: python scripts/update_data.py

      - name: ⑤ CSV を GitHub に push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/usdjpy_10min.csv
          # 変更がなければスキップ
          git diff --cached --quiet || git commit -m "chore: update usdjpy_10min.csv [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
